server {
    # IPv6 listen removed: on some Docker hosts [::] bind fails and nginx won't start.
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
